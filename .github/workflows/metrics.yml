name: Metrics

on:
  schedule:
    # Daily at 03:17 UTC (avoid the top-of-hour rush on lowlighter/metrics)
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    name: Generate metrics.svg
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: stefanwerfling
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Berlin
          config_padding: 0, 8 + 11%

          # Visual
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # People & community
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_size: 28
          plugin_people_limit: 49

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          # Code stats
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          # Habits & activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

          # Repos
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15

          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes